<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapSpec Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #000000;
      --border: #2A2A2A;
      --text: #ffffff;
      --text-muted: #8A8A8A;
      --primary: #ffffff;
    }
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      letter-spacing: -0.04em;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    /* Top Navigation bar */
    .nav-bar {
      width: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
    }
    .nav-container {
      max-width: 1200px;
      width: 100%;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .nav-links a:hover {
      color: var(--text);
    }
    .btn-primary {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .hero {
      max-width: 800px;
      margin: 120px auto 60px;
      text-align: center;
      padding: 0 24px;
    }
    .hero-eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 600;
    }
    .hero h1 {
      font-size: 64px;
      line-height: 1.05;
      margin-bottom: 24px;
    }
    .hero p {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 40px;
    }
    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.05);
    }
    .upload-box {
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      aspect-ratio: 16/9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #000;
      color: var(--text-muted);
    }
    .upload-box svg {
      width: 32px;
      height: 32px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <div class="nav-container">
      <div class="nav-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        SnapSpec
      </div>
      <div class="nav-links">
        <a href="#">Docs</a>
        <a href="#">GitHub</a>
        <a href="#">Pricing</a>
      </div>
      <button class="btn-primary">Open App</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Turn inspiration into blueprints</div>
    <h1>Design systems extracted from pixels.</h1>
    <p>Upload a screenshot. Generate a Design.md specification. Paste it into your AI coding tool. Build faster.</p>
    <div class="hero-buttons">
      <button class="btn-primary">Start Generating</button>
      <button class="btn-secondary">View Demos</button>
    </div>
  </div>

  <div class="upload-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
    <div style="text-align: center;">
      <div style="color: #fff; font-weight: 500; margin-bottom: 4px;">Drag & drop screenshot</div>
      <div style="font-size: 13px;">Supported: PNG, JPG, WebP</div>
    </div>
  </div>

</body>
</html>
