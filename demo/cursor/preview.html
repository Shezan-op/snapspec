<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointer (Cursor-Inspired) Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #121212;
      --border: #222222;
      --text: #ffffff;
      --text-muted: #888888;
      --accent: #FF5A00;
    }
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    h1, h2, h3 {
      margin: 0;
      letter-spacing: -0.02em;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    /* Top Navigation bar */
    .nav-bar {
      width: 100%;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      padding: 16px 0;
    }
    .nav-container {
      max-width: 1000px;
      width: 100%;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-weight: 600;
      font-size: 16px;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .nav-links a:hover {
      color: var(--text);
    }
    .btn-primary {
      background: #ffffff;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }
    .hero {
      max-width: 800px;
      margin: 100px auto 60px;
      text-align: center;
      padding: 0 24px;
    }
    .hero h1 {
      font-size: 56px;
      line-height: 1.1;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .hero p {
      font-size: 20px;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 40px;
    }
    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn-large {
      background: var(--text);
      color: var(--bg);
      padding: 14px 28px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .mockup-container {
      max-width: 1000px;
      margin: 0 auto 100px;
      padding: 0 24px;
    }
    .mockup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-family: monospace;
      font-size: 14px;
    }
    .accent-text {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <div class="nav-container">
      <div class="nav-logo">Pointer</div>
      <div class="nav-links">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Changelog</a>
      </div>
      <button class="btn-primary">Download</button>
    </div>
  </div>

  <div class="hero">
    <h1>The code editor for <br>the <span class="accent-text">AI</span> age.</h1>
    <p>Built to make you extraordinarily productive, Pointer is the best way to code with AI.</p>
    <div class="hero-buttons">
      <button class="btn-large">Download for Windows</button>
    </div>
  </div>

  <div class="mockup-container">
    <div class="mockup">
      // Product screenshot goes here
    </div>
  </div>
</body>
</html>
